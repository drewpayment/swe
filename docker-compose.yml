services:
  # ─── Temporal ─────────────────────────────────────────
  temporal:
    image: temporalio/auto-setup:latest
    ports:
      - "7233:7233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-db
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    volumes:
      - ./config/dynamicconfig:/etc/temporal/config/dynamicconfig
    depends_on:
      temporal-db:
        condition: service_healthy
    networks:
      - swe-net

  temporal-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    ports:
      - "5433:5432"
    volumes:
      - temporal-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - swe-net

  temporal-ui:
    image: temporalio/ui:latest
    ports:
      - "8233:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal
    networks:
      - swe-net

  # ─── LiteLLM ─────────────────────────────────────────
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "4000:4000"
    volumes:
      - ./config/litellm.yaml:/app/config.yaml
    command: ["--config", "/app/config.yaml"]
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-}
    networks:
      - swe-net

  # ─── PostgreSQL (App) ────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: swe
      POSTGRES_PASSWORD: swe
      POSTGRES_DB: swe
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swe"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - swe-net

  # ─── Redis ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - swe-net

  # ─── Database Migrations ─────────────────────────────
  swe-migrate:
    image: postgres:16
    volumes:
      - ./migrations:/migrations
      - ./scripts/init-db.sh:/init-db.sh
    environment:
      - DATABASE_URL=postgres://swe:swe@postgres:5432/swe
    entrypoint: ["/bin/bash", "/init-db.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - swe-net

  # ─── SWE API ─────────────────────────────────────────
  swe-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://swe:swe@postgres:5432/swe?sslmode=disable
      - TEMPORAL_ADDRESS=temporal:7233
      - LITELLM_URL=http://litellm:4000
      - LITELLM_API_KEY=sk-swe-dev-key
      - REDIS_URL=redis://redis:6379
    depends_on:
      swe-migrate:
        condition: service_completed_successfully
      temporal:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - swe-net

  # ─── SWE Worker ──────────────────────────────────────
  # NOTE: The worker runs on the HOST (not Docker) so it can spawn OpenCode
  # processes and access local project directories. Start it with:
  #   ./scripts/worker-start.sh
  #
  # The Dockerized worker is kept here commented out for reference.
  # swe-worker:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #     target: worker
  #   environment:
  #     - DATABASE_URL=postgres://swe:swe@postgres:5432/swe?sslmode=disable
  #     - TEMPORAL_ADDRESS=temporal:7233
  #     - LITELLM_URL=http://litellm:4000
  #     - LITELLM_API_KEY=sk-swe-dev-key
  #     - REDIS_URL=redis://redis:6379
  #     - API_INTERNAL_URL=http://swe-api:8080
  #   depends_on:
  #     swe-migrate:
  #       condition: service_completed_successfully
  #     temporal:
  #       condition: service_started
  #   networks:
  #     - swe-net

  # ─── SWE Web UI ──────────────────────────────────────
  swe-web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # NEXT_PUBLIC_API_URL/WS_URL intentionally omitted —
      # config.ts detects OrbStack (.orb.local) vs localhost at runtime
      - BETTER_AUTH_SECRET=change-me-in-production
      - DATABASE_URL=postgres://swe:swe@postgres:5432/swe
    depends_on:
      - swe-api
      - postgres
    networks:
      - swe-net

volumes:
  temporal-db-data:
  postgres-data:
  redis-data:

networks:
  swe-net:
    driver: bridge
